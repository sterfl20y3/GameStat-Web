services:
  gamestats_db:
    image: postgres:15-alpine
    container_name: gamestats_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: gamestats
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d gamestats" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gamestats_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamestats_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:rootpassword@gamestats_db:5432/gamestats?schema=public
      NODE_ENV: production
    depends_on:
      gamestats_db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
